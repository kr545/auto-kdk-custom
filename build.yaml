include:
  - board: akdk_bt1
    shield: split_ergo60pct_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    # right用のextra-modulesやoverlayはleft/rightだけで指定

  - board: akdk_bt1
    shield: split_ergo60pct_right
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

  - board: seeeduino_xiao_ble
    shield: dongle 
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=y -DOVERLAY_CONFIG=/__w/auto-kdk_1/auto-kdk_1/boards/shields/split_ergo60pct/dongle.conf
    snippet: studio-rpc-usb-uart
    

  - board: akdk_bt1
    shield: settings_reset

  - board: seeeduino_xiao_ble
    shield: settings_reset
