# ==========================================
# 1. 基本システム・BLE・Split設定
# ==========================================
CONFIG_ZMK_KEYBOARD_NAME="My zmk dongle"
CONFIG_BT_DEVICE_NAME="My ZMK dongle"

CONFIG_ZMK_BLE=y
CONFIG_BT=y
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# 接続デバイス数設定（周辺機器2台 + PC等）
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
CONFIG_BT_MAX_CONN=7
CONFIG_BT_MAX_PAIRED=9

# ==========================================
# 2. USB & ポインティングデバイス（トラックボール）
# ==========================================
CONFIG_ZMK_USB=y
CONFIG_ZMK_POINTING=y

# ==========================================
# 3. ディスプレイ基本設定
# ==========================================
CONFIG_DISPLAY=y
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# ログ出力（デバッグ用）
CONFIG_LOG=y
CONFIG_THREAD_STACK_INFO=y

# PWMとLEDドライバのシステムを有効化する
CONFIG_PWM=y
CONFIG_LED=y
CONFIG_LED_PWM=y
# 画面の描画色をソフトウェア的に反転させる（白黒を逆にする）
CONFIG_ZMK_DISPLAY_INVERT=n
# ==========================================
# 4. LVGL / カスタム表示用設定（重要！）
# ==========================================
# Cコードで lv_label_... 等を使用するために必須
CONFIG_LVGL=y
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_CANVAS=y
CONFIG_LV_USE_IMG=y

# ST7789(240x280)の描画バッファ用にメモリを確保
CONFIG_LV_Z_MEM_POOL_SIZE=16384

# フォント設定
CONFIG_LV_FONT_MONTSERRAT_12=y
CONFIG_LV_FONT_MONTSERRAT_16=y
CONFIG_LV_FONT_MONTSERRAT_20=y

# ==========================================
# 5. Dongle Screen ウィジェット専用設定
# ==========================================
CONFIG_DONGLE_SCREEN_WPM_ACTIVE=y
CONFIG_DONGLE_SCREEN_LAYER_ACTIVE=y
CONFIG_DONGLE_SCREEN_MODIFIER_ACTIVE=y
CONFIG_DONGLE_SCREEN_OUTPUT_ACTIVE=y
CONFIG_DONGLE_SCREEN_BATTERY_ACTIVE=y

# ドングル側のバッテリーは非表示にする（左右の2つのみ表示）
CONFIG_ZMK_DONGLE_DISPLAY_DONGLE_BATTERY=n

# 左右ボードからのバッテリーレベル取得を有効化（ウィジェット表示に必須）
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# ==========================================
# 6. 入力デバイス（CST816S タッチパネル）
# ==========================================
CONFIG_INPUT=y
CONFIG_INPUT_CST816S=y
CONFIG_INPUT_CST816S_INTERRUPT=y

# バックライト機能を有効化
CONFIG_ZMK_BACKLIGHT=y
# 起動時の明るさを100%にする
CONFIG_ZMK_BACKLIGHT_BRT_START=100
# 自動オフを無効にする（デバッグのため）
CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=y
